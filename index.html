<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workout Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM45pVfshkhb4_oG8VX08S2blYQlA8nSA",
            authDomain: "workout-tracker-3bf5e.firebaseapp.com",
            projectId: "workout-tracker-3bf5e",
            storageBucket: "workout-tracker-3bf5e.firebasestorage.app",
            messagingSenderId: "1051835495537",
            appId: "1:1051835495537:web:d825f0a61ccce60f4bd7d0",
            measurementId: "G-7MK068BRL8"
        };


        firebase.initializeApp(firebaseConfig);
    </script>

</head>

<body>
    <h1>Workout Tracker</h1>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">

        <div id="dateAndWorkout" style="display:flex; align-items:center; gap:12px;">
            <div id="todayDate" style="font-size:14px; color:#aaa; font-weight:600;"></div>
            <div id="todayWorkout" style=" font-size:18px; font-weight:bold; color:#fff; padding-left:40px;"></div>
        </div>
        <button id="calendarBtn"
            style="margin-left:auto; background:#6c3483; color:#fff; border-radius:8px; padding:12px 20px; font-size:18px; border:none; cursor:pointer;">≡</button>
        <div id="menuDropdown" style="
  display:none;
  position:absolute;
  top:60px;
  right:15px;
  background:#23272a;
  border-radius:10px;
  box-shadow:0 8px 24px #0006;
  overflow:hidden;
  z-index:2000;
  min-width:160px;
">
            <div class="menu-item" id="openCalendar">📅 Calendar</div>
            <div class="menu-item" id="openWorkouts">💪 Workouts</div>
        </div>
    </div>
    <div id="exerciseCardContainer">
        <div id="exerciseCard"></div>
    </div>
  

    <!-- Calendar Modal -->
    <div id="calendarModal"
        style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000a; z-index:1000; justify-content:center; align-items:center;">
        <div class="calendar-modal-content">
            <div style="position:relative; width:100%;">

                <div id="closeCalendarModal" class="modal-close">✕</div>

                <div id="fullCalendar"></div>

            </div>

        </div>
    </div>

    <!-- Workout Modal -->

    <div id="workoutModal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:#000a;
  z-index:1000;
  justify-content:center;
  align-items:center;
">
        <div style="
    background:#23272a;
    border-radius:18px;
    padding:24px;
    min-width:300px;
    max-width:90vw;
  ">


            <div style="position:relative;">

                <div id="closeWorkoutModal" class="modal-close">✕</div>
                <div style="font-size:18px; margin-bottom:16px; font-weight:600;">
                    Select Workout
                </div>

                <div id="workoutList"></div>

            </div>
        </div>
    </div>

     <!-- Exercise Modal -->

    <div id="exerciseModal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:#000a;
  z-index:1000;
  justify-content:center;
  align-items:center;
">
        <div style="
    background:#23272a;
    border-radius:18px;
    padding:24px;
    min-width:300px;
    max-width:90vw;
  ">


            <div style="position:relative;">

                <div id="closeExerciseModal" class="modal-close">✕</div>
                <div style="font-size:18px; margin-bottom:16px; font-weight:600;">
                    Select Exercise
                </div>

                <div id="exerciseList"></div>

            </div>
        </div>
    </div>



    <script src="script.js"></script>
</body>

</html>
